env:
  CARGO_TERM_COLOR: "always"
  CARGO_BUILD_JOBS: "2"
  RUST_TEST_THREADS: "2"
  CTX_BOOTSTRAP_BAZELISK: "1"

steps:
  - label: ":bazel: search CI gate"
    key: "search-mvp"
    command: "./scripts/check.sh --mode=ci"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "bazel-testlogs/**/*.log"
      - "bazel-testlogs/**/test.outputs/**/*"
      - "bazel-testlogs/**/test.outputs/**/ctx-artifacts/**/*"
      - "bazel-testlogs/**/*.zip"
