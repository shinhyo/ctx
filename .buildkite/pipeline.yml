env:
  CI: "true"
  CARGO_TERM_COLOR: "always"

steps:
  - label: "source: contracts"
    key: "source-contracts"
    command:
      - ".buildkite/validate-pipeline.sh"
      - ".buildkite/run-bazel.sh test //:buildkite_config_test //:schemas"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-proof"
    artifact_paths:
      - "bazel-testlogs/**/*"
    timeout_in_minutes: 20

  - label: "build graph: no-build analysis"
    key: "build-graph-analysis"
    depends_on: "source-contracts"
    command:
      - ".buildkite/run-bazel.sh build --nobuild //:presubmit //:all-rust //:all-web //:e2e-premerge //:release //:release-artifacts"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
    artifact_paths:
      - "bazel-testlogs/**/*"
    timeout_in_minutes: 30

  - wait: ~

  - label: "rust: all-rust"
    key: "rust-all"
    command: ".buildkite/run-bazel.sh test //:all-rust"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-proof"
    artifact_paths:
      - "bazel-testlogs/**/*"
    timeout_in_minutes: 120

  - label: "web: all-web"
    key: "web-all"
    command: ".buildkite/run-bazel.sh test //:all-web"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
    artifact_paths:
      - "bazel-testlogs/**/*"
    timeout_in_minutes: 90

  - label: "cli: linux x64"
    key: "cli-linux-x64"
    command: ".buildkite/run-cli-linux.sh"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-proof"
    artifact_paths:
      - "bazel-bin/core/crates/ctx-http/ctx"
    timeout_in_minutes: 90

  - label: "cli: windows x64 package"
    key: "cli-windows-x64-package"
    command: ".buildkite/run-cli-windows-package.sh"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
    artifact_paths:
      - "ctx-cli-windows-x64/**/*"
    timeout_in_minutes: 120

  - label: "cli: windows x64"
    key: "cli-windows-x64"
    depends_on: "cli-windows-x64-package"
    command: "powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .buildkite/run-cli-windows.ps1"
    agents:
      queue: "windows-x64"
    artifact_paths:
      - "ctx-cli-windows-x64-smoke.json"
    timeout_in_minutes: 20

  - wait: ~

  - label: "desktop: package linux x64"
    key: "desktop-linux-x64"
    command: ".buildkite/run-desktop-package-linux.sh"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
    artifact_paths:
      - "core/apps/desktop/src-tauri/target/release/bundle/**/*"
    timeout_in_minutes: 150

  - label: "desktop: package macos arm64"
    key: "desktop-macos-arm64"
    command: "CTX_EXPECTED_HOST_ARCH=arm64 .buildkite/run-desktop-package-macos.sh"
    agents:
      queue: "ctx-mac-gui-shared-arm64"
    artifact_paths:
      - "core/apps/desktop/src-tauri/target/release/bundle/**/*"
    timeout_in_minutes: 180

  - label: "desktop: package macos x64"
    key: "desktop-macos-x64"
    command: "CTX_EXPECTED_HOST_ARCH=x86_64 .buildkite/run-desktop-package-macos.sh"
    agents:
      queue: "ctx-mac-gui-shared-x64"
    artifact_paths:
      - "core/apps/desktop/src-tauri/target/release/bundle/**/*"
    timeout_in_minutes: 180

  - wait: ~
    continue_on_failure: true

  - label: "browser: premerge e2e"
    key: "browser-premerge-e2e"
    command: ".buildkite/run-bazel.sh test //:e2e-premerge"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-proof"
    artifact_paths:
      - "bazel-testlogs/**/*"
    timeout_in_minutes: 90

  - wait: ~

  - label: "release: proof"
    key: "release-proof"
    command: ".buildkite/run-bazel.sh test //:release"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-proof"
    artifact_paths:
      - "bazel-testlogs/**/*"
    timeout_in_minutes: 150

  - label: "artifact: release"
    key: "release-artifacts"
    depends_on: "release-proof"
    command: ".buildkite/run-bazel.sh build //:release-artifacts"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
    artifact_paths:
      - "bazel-bin/core/apps/web/dist/**/*"
      - "bazel-bin/core/crates/ctx-http/ctx"
      - "bazel-testlogs/**/*"
    timeout_in_minutes: 60
