env:
  CARGO_TERM_COLOR: "always"
  CARGO_BUILD_JOBS: "2"
  RUST_TEST_THREADS: "2"
  CTX_BOOTSTRAP_BAZELISK: "1"

steps:
  - label: ":bazel: public smoke gate"
    key: "public-smoke"
    command: |
      apt_get_updated=0

      run_apt_get() {
        if command -v sudo >/dev/null 2>&1; then
          sudo "$$@"
        else
          "$$@"
        fi
      }

      install_ubuntu_package() {
        command -v apt-get >/dev/null 2>&1 || {
          echo "$$1 is missing and apt-get is unavailable on this Buildkite agent" >&2
          exit 127
        }
        if [ "$${apt_get_updated}" -eq 0 ]; then
          run_apt_get apt-get update
          apt_get_updated=1
        fi
        run_apt_get env DEBIAN_FRONTEND=noninteractive apt-get install -y "$$1"
      }

      ensure_runner_tool() {
        tool_binary="$$1"
        apt_package="$$2"
        required_message="$$3"

        if ! command -v "$${tool_binary}" >/dev/null 2>&1; then
          install_ubuntu_package "$${apt_package}"
        fi
        command -v "$${tool_binary}" >/dev/null 2>&1 || {
          echo "$${required_message}" >&2
          exit 127
        }
      }

      ensure_runner_tool zip zip "zip is required for Bazel undeclared test output packaging"
      ensure_runner_tool rg ripgrep "ripgrep (rg) is required for static package audits"
      ./scripts/check.sh --mode=ci
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-control"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "bazel-testlogs/**/*.log"
      - "bazel-testlogs/**/test.outputs/**/*"
      - "bazel-testlogs/**/*.zip"

  - label: ":stopwatch: public perf budget gate"
    key: "public-perf"
    if: build.env("CTX_PUBLIC_CLI_PERF_GATES") == "1"
    command: |
      ./scripts/check.sh --mode=perf
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-control"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "bazel-testlogs/**/*.log"
      - "bazel-testlogs/**/test.outputs/**/*"
      - "bazel-testlogs/**/*.zip"

  - wait: ~
    if: build.env("CTX_PUBLIC_CLI_ARTIFACT_MATRIX") == "1"

  - label: ":package: public CLI linux-x64"
    key: "public-cli-linux-x64"
    if: build.env("CTX_PUBLIC_CLI_ARTIFACT_MATRIX") == "1"
    command: |
      scripts/build-public-cli-artifact.sh linux-x64
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-control"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "target/public-cli-artifacts/ctx"
      - "target/public-cli-artifacts/ctx.sha256"
      - "target/public-cli-artifacts/ctx.version"

  - label: ":package: public CLI windows-x64"
    key: "public-cli-windows-x64"
    if: build.env("CTX_PUBLIC_CLI_ARTIFACT_MATRIX") == "1"
    command: |
      scripts/build-public-cli-artifact.sh windows-x64
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-control"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "target/public-cli-artifacts/ctx.exe"
      - "target/public-cli-artifacts/ctx.exe.sha256"
      - "target/public-cli-artifacts/ctx.exe.version"

  - label: ":package: public CLI freebsd-x64"
    key: "public-cli-freebsd-x64"
    if: build.env("CTX_PUBLIC_CLI_ARTIFACT_MATRIX") == "1"
    command: |
      scripts/build-public-cli-artifact.sh freebsd-x64
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-control"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "target/public-cli-artifacts/ctx-freebsd-x64"
      - "target/public-cli-artifacts/ctx-freebsd-x64.sha256"
      - "target/public-cli-artifacts/ctx-freebsd-x64.version"

  - label: ":package: public CLI macos-arm64"
    key: "public-cli-macos-arm64"
    if: build.env("CTX_PUBLIC_CLI_ARTIFACT_MATRIX") == "1"
    command: |
      scripts/build-public-cli-artifact.sh macos-arm64
    agents:
      queue: "ctx-mac-gui-shared-arm64"
      os: "darwin"
      arch: "arm64"
    concurrency: 1
    concurrency_group: "ctx-mac-gui-shared-arm64"
    concurrency_method: "eager"
    timeout_in_minutes: 60
    artifact_paths:
      - "target/public-cli-artifacts/ctx-macos-arm64"
      - "target/public-cli-artifacts/ctx-macos-arm64.sha256"
      - "target/public-cli-artifacts/ctx-macos-arm64.version"

  - label: ":package: public CLI macos-x64"
    key: "public-cli-macos-x64"
    if: build.env("CTX_PUBLIC_CLI_ARTIFACT_MATRIX") == "1"
    command: |
      scripts/build-public-cli-artifact.sh macos-x64
    agents:
      queue: "ctx-mac-gui-shared-arm64"
      os: "darwin"
      arch: "arm64"
    concurrency: 1
    concurrency_group: "ctx-mac-gui-shared-arm64"
    concurrency_method: "eager"
    timeout_in_minutes: 60
    artifact_paths:
      - "target/public-cli-artifacts/ctx-macos-x64"
      - "target/public-cli-artifacts/ctx-macos-x64.sha256"
      - "target/public-cli-artifacts/ctx-macos-x64.version"
