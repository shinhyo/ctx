# Slim Work Recorder CI/release matrix.
#
# Linux verification is intentionally sequential so Cargo, Bazel, examples, and
# release builds do not overlap on small runners. Host release dry-runs are
# non-publishing and fail closed if Buildkite routes them to the wrong host
# triple.
#
# Known external runner queues are taken from the ctx-private Buildkite queue
# inventory:
# - release-linux-managed
# - ctx-mac-gui-shared-arm64
# - ctx-mac-gui-shared-x64
# - windows-x64
#
# No FreeBSD runner queue is documented there yet. This pipeline records a
# blocker artifact for x86_64-unknown-freebsd until a native queue exists or a
# separately proven cross-build lane is added.

env:
  CARGO_TERM_COLOR: "always"
  CARGO_BUILD_JOBS: "2"
  RUST_TEST_THREADS: "2"
  BAZEL_JOBS: "2"
  BAZEL_LOCAL_CPU_RESOURCES: "2"
  BAZEL_LOCAL_RAM_RESOURCES: "2048"

steps:
  - label: ":buildkite: pipeline contract"
    key: "pipeline-contract"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/pipeline-contract ./scripts/check-buildkite-pipeline.sh"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 5
    artifact_paths:
      - "artifacts/buildkite/pipeline-contract/*"
      - "artifacts/buildkite/pipeline-contract/**/*"

  - label: ":rust: fmt"
    key: "fmt"
    depends_on: "pipeline-contract"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/fmt ./scripts/check.sh fmt"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 10
    artifact_paths:
      - "artifacts/buildkite/fmt/*"
      - "artifacts/buildkite/fmt/**/*"

  - label: ":memo: docs"
    key: "docs"
    depends_on: "fmt"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/docs ./scripts/check.sh docs"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 10
    artifact_paths:
      - "artifacts/buildkite/docs/*"
      - "artifacts/buildkite/docs/**/*"

  - label: ":rust: check"
    key: "cargo-check"
    depends_on: "docs"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/check ./scripts/check.sh check"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 30
    artifact_paths:
      - "artifacts/buildkite/check/*"
      - "artifacts/buildkite/check/**/*"

  - label: ":rust: clippy"
    key: "clippy"
    depends_on: "cargo-check"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/clippy ./scripts/check.sh clippy"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 30
    artifact_paths:
      - "artifacts/buildkite/clippy/*"
      - "artifacts/buildkite/clippy/**/*"

  - label: ":rust: test"
    key: "cargo-test"
    depends_on: "clippy"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/test ./scripts/check.sh test"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 45
    artifact_paths:
      - "artifacts/buildkite/test/*"
      - "artifacts/buildkite/test/**/*"

  - label: ":test_tube: examples"
    key: "examples"
    depends_on: "cargo-test"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/examples ./scripts/check.sh examples"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 30
    artifact_paths:
      - "artifacts/buildkite/examples/*"
      - "artifacts/buildkite/examples/**/*"

  - label: ":bazel: bazel"
    key: "bazel"
    depends_on: "examples"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/bazel CTX_REQUIRE_BAZEL=1 ./scripts/check.sh bazel"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 45
    artifact_paths:
      - "artifacts/buildkite/bazel/*"
      - "artifacts/buildkite/bazel/**/*"

  - label: ":clipboard: product decision regressions"
    key: "product-decisions"
    depends_on: "bazel"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/product-decisions ./scripts/check.sh product-decisions"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 10
    artifact_paths:
      - "artifacts/buildkite/finished-product/product-decisions/*"
      - "artifacts/buildkite/finished-product/product-decisions/**/*"

  - label: ":package: provider fixture import"
    key: "provider-fixtures"
    depends_on: "product-decisions"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/provider-fixtures ./scripts/check.sh provider-fixtures"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 20
    artifact_paths:
      - "artifacts/buildkite/finished-product/provider-fixtures/*"
      - "artifacts/buildkite/finished-product/provider-fixtures/**/*"

  - label: ":satellite: provider live E2E lane definitions"
    key: "provider-live-e2e-lanes"
    depends_on: "provider-fixtures"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/provider-live-e2e-lanes ./scripts/release-provider-live-e2e-lanes.sh definitions"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 5
    artifact_paths:
      - "artifacts/buildkite/provider-live-e2e-lanes/*"
      - "artifacts/buildkite/provider-live-e2e-lanes/**/*"

  - label: ":satellite: gated live provider E2E"
    key: "provider-live-e2e-gated"
    if: |
      build.env("CTX_LIVE_PROVIDER_E2E") == "1" &&
      (
        build.env("CTX_LIVE_PROVIDER_CODEX") == "1" ||
        build.env("CTX_LIVE_PROVIDER_CLAUDE_CODE") == "1" ||
        build.env("CTX_LIVE_PROVIDER_PI") == "1" ||
        build.env("CTX_LIVE_PROVIDER_OPEN_CODE") == "1" ||
        build.env("CTX_LIVE_PROVIDER_ANTIGRAVITY_CLI") == "1" ||
        build.env("CTX_LIVE_PROVIDER_GEMINI_CLI") == "1" ||
        build.env("CTX_LIVE_PROVIDER_CURSOR") == "1"
      )
    depends_on: "provider-live-e2e-lanes"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/provider-live-e2e ./scripts/release-provider-live-e2e-lanes.sh run-selected"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/provider-live-e2e/*"
      - "artifacts/buildkite/provider-live-e2e/**/*"

  - label: ":mag: rich search/context"
    key: "rich-search-context"
    depends_on: "provider-live-e2e-lanes"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/rich-search-context ./scripts/check.sh rich-search-context"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 20
    artifact_paths:
      - "artifacts/buildkite/finished-product/rich-search-context/*"
      - "artifacts/buildkite/finished-product/rich-search-context/**/*"

  - label: ":bar_chart: dashboard/report artifact review"
    key: "dashboard-report-artifact-review"
    depends_on: "rich-search-context"
    command: |
      npm --prefix apps/ctx-dashboard ci
      CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/dashboard-report-artifact-review ./scripts/check.sh dashboard-report-artifact-review
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 20
    artifact_paths:
      - "artifacts/buildkite/finished-product/dashboard-report-artifact-review/*"
      - "artifacts/buildkite/finished-product/dashboard-report-artifact-review/**/*"

  - label: ":github: PR publish dry-run"
    key: "pr-publish-dry-run"
    depends_on: "dashboard-report-artifact-review"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/pr-publish-dry-run ./scripts/check.sh pr-publish-dry-run"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 20
    artifact_paths:
      - "artifacts/buildkite/finished-product/pr-publish-dry-run/*"
      - "artifacts/buildkite/finished-product/pr-publish-dry-run/**/*"

  - label: ":lock: security archive fixtures"
    key: "security-archive-fixtures"
    depends_on: "pr-publish-dry-run"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/security-archive-fixtures ./scripts/check.sh security-archive-fixtures"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 10
    artifact_paths:
      - "artifacts/buildkite/finished-product/security-archive-fixtures/*"
      - "artifacts/buildkite/finished-product/security-archive-fixtures/**/*"

  - label: ":twisted_rightwards_arrows: jj e2e blocker status"
    key: "jj-e2e-blocker-status"
    depends_on: "security-archive-fixtures"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/jj-e2e-blocker-status ./scripts/check.sh jj-e2e-blocker-status"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 20
    artifact_paths:
      - "artifacts/buildkite/finished-product/jj-e2e-blocker-status/*"
      - "artifacts/buildkite/finished-product/jj-e2e-blocker-status/**/*"

  - label: ":package: installer dry-run smoke"
    key: "installer-dry-run-smoke"
    depends_on: "jj-e2e-blocker-status"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/finished-product/installer-dry-run-smoke ./scripts/check.sh installer-dry-run-smoke"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 10
    artifact_paths:
      - "artifacts/buildkite/finished-product/installer-dry-run-smoke/*"
      - "artifacts/buildkite/finished-product/installer-dry-run-smoke/**/*"

  - label: ":linux: smoke linux-x64"
    key: "platform-smoke-linux-x64"
    depends_on: "installer-dry-run-smoke"
    command: "./scripts/check.sh platform-smoke"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/platform-smoke/linux-x64"
      CTX_EXPECT_HOST_TRIPLE: "x86_64-unknown-linux-gnu"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 30
    artifact_paths:
      - "artifacts/buildkite/platform-smoke/linux-x64/*"
      - "artifacts/buildkite/platform-smoke/linux-x64/**/*"

  - label: ":mac: smoke macos-arm64"
    key: "platform-smoke-macos-arm64"
    depends_on: "bazel"
    command: "./scripts/check.sh platform-smoke"
    plugins:
      - custom-checkout#v1.8.0:
          skip_checkout: true
          delete_checkout: true
          interpolate_checkout_path: "$${TMPDIR:-/tmp}/ctx-records-$${BUILDKITE_BUILD_NUMBER}-$${BUILDKITE_STEP_KEY}-$${BUILDKITE_JOB_ID}"
          repos:
            - url: "https://github.com/ctxrs/ctx.git"
              ref: "${BUILDKITE_COMMIT}"
              fetch: true
              fetch_flags:
                - "--depth=1"
                - "--no-tags"
                - "--filter=blob:none"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/platform-smoke/macos-arm64"
      CTX_EXPECT_HOST_TRIPLE: "aarch64-apple-darwin"
    agents:
      queue: "ctx-mac-gui-shared-arm64"
      arch: "arm64"
    concurrency: 1
    concurrency_group: "ctx-mac-gui-shared-arm64"
    concurrency_method: "eager"
    priority: 60
    timeout_in_minutes: 30
    artifact_paths:
      - "artifacts/buildkite/platform-smoke/macos-arm64/*"
      - "artifacts/buildkite/platform-smoke/macos-arm64/**/*"

  - label: ":mac: smoke macos-x64"
    key: "platform-smoke-macos-x64"
    depends_on: "bazel"
    command: "./scripts/check.sh platform-smoke"
    plugins:
      - custom-checkout#v1.8.0:
          skip_checkout: true
          delete_checkout: true
          interpolate_checkout_path: "$${TMPDIR:-/tmp}/ctx-records-$${BUILDKITE_BUILD_NUMBER}-$${BUILDKITE_STEP_KEY}-$${BUILDKITE_JOB_ID}"
          repos:
            - url: "https://github.com/ctxrs/ctx.git"
              ref: "${BUILDKITE_COMMIT}"
              fetch: true
              fetch_flags:
                - "--depth=1"
                - "--no-tags"
                - "--filter=blob:none"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/platform-smoke/macos-x64"
      CTX_EXPECT_HOST_TRIPLE: "x86_64-apple-darwin"
    agents:
      queue: "ctx-mac-gui-shared-x64"
      arch: "x86_64"
    concurrency: 1
    concurrency_group: "ctx-mac-gui-shared-x64"
    concurrency_method: "eager"
    priority: 50
    timeout_in_minutes: 30
    artifact_paths:
      - "artifacts/buildkite/platform-smoke/macos-x64/*"
      - "artifacts/buildkite/platform-smoke/macos-x64/**/*"

  - label: ":windows: smoke windows-x64"
    key: "platform-smoke-windows-x64"
    depends_on: "bazel"
    command: "powershell -NoProfile -ExecutionPolicy Bypass -File scripts\\ci-windows.ps1 platform-smoke"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/platform-smoke/windows-x64"
      CTX_EXPECT_HOST_TRIPLE: "x86_64-pc-windows-gnu"
    agents:
      queue: "windows-x64"
      os: "windows"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/platform-smoke/windows-x64/*"
      - "artifacts/buildkite/platform-smoke/windows-x64/**/*"

  - label: ":linux: release dry-run linux-x64"
    key: "release-dry-run-linux-x64"
    depends_on: "platform-smoke-linux-x64"
    command: "./scripts/release-dry-run.sh"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/release-dry-run/linux-x64"
      CTX_RELEASE_PLATFORM: "linux-x64"
      CTX_RELEASE_TARGET_TRIPLE: "x86_64-unknown-linux-gnu"
      CTX_EXPECT_HOST_TRIPLE: "x86_64-unknown-linux-gnu"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/linux-x64/*"
      - "artifacts/buildkite/release-dry-run/linux-x64/**/*"

  - label: ":mac: release dry-run macos-arm64"
    key: "release-dry-run-macos-arm64"
    depends_on: "platform-smoke-macos-arm64"
    command: "./scripts/release-dry-run.sh"
    plugins:
      - custom-checkout#v1.8.0:
          skip_checkout: true
          delete_checkout: true
          interpolate_checkout_path: "$${TMPDIR:-/tmp}/ctx-records-$${BUILDKITE_BUILD_NUMBER}-$${BUILDKITE_STEP_KEY}-$${BUILDKITE_JOB_ID}"
          repos:
            - url: "https://github.com/ctxrs/ctx.git"
              ref: "${BUILDKITE_COMMIT}"
              fetch: true
              fetch_flags:
                - "--depth=1"
                - "--no-tags"
                - "--filter=blob:none"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/release-dry-run/macos-arm64"
      CTX_RELEASE_PLATFORM: "macos-arm64"
      CTX_RELEASE_TARGET_TRIPLE: "aarch64-apple-darwin"
      CTX_EXPECT_HOST_TRIPLE: "aarch64-apple-darwin"
    agents:
      queue: "ctx-mac-gui-shared-arm64"
      arch: "arm64"
    concurrency: 1
    concurrency_group: "ctx-mac-gui-shared-arm64"
    concurrency_method: "eager"
    priority: 60
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/macos-arm64/*"
      - "artifacts/buildkite/release-dry-run/macos-arm64/**/*"

  - label: ":mac: release dry-run macos-x64"
    key: "release-dry-run-macos-x64"
    depends_on: "platform-smoke-macos-x64"
    command: "./scripts/release-dry-run.sh"
    plugins:
      - custom-checkout#v1.8.0:
          skip_checkout: true
          delete_checkout: true
          interpolate_checkout_path: "$${TMPDIR:-/tmp}/ctx-records-$${BUILDKITE_BUILD_NUMBER}-$${BUILDKITE_STEP_KEY}-$${BUILDKITE_JOB_ID}"
          repos:
            - url: "https://github.com/ctxrs/ctx.git"
              ref: "${BUILDKITE_COMMIT}"
              fetch: true
              fetch_flags:
                - "--depth=1"
                - "--no-tags"
                - "--filter=blob:none"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/release-dry-run/macos-x64"
      CTX_RELEASE_PLATFORM: "macos-x64"
      CTX_RELEASE_TARGET_TRIPLE: "x86_64-apple-darwin"
      CTX_EXPECT_HOST_TRIPLE: "x86_64-apple-darwin"
    agents:
      queue: "ctx-mac-gui-shared-x64"
      arch: "x86_64"
    concurrency: 1
    concurrency_group: "ctx-mac-gui-shared-x64"
    concurrency_method: "eager"
    priority: 50
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/macos-x64/*"
      - "artifacts/buildkite/release-dry-run/macos-x64/**/*"

  - label: ":windows: release dry-run windows-x64"
    key: "release-dry-run-windows-x64"
    depends_on: "platform-smoke-windows-x64"
    command: "powershell -NoProfile -ExecutionPolicy Bypass -File scripts\\ci-windows.ps1 release-dry-run"
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/release-dry-run/windows-x64"
      CTX_RELEASE_PLATFORM: "windows-x64"
      CTX_RELEASE_TARGET_TRIPLE: "x86_64-pc-windows-gnu"
      CTX_EXPECT_HOST_TRIPLE: "x86_64-pc-windows-gnu"
    agents:
      queue: "windows-x64"
      os: "windows"
      arch: "x86_64"
    timeout_in_minutes: 90
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/windows-x64/*"
      - "artifacts/buildkite/release-dry-run/windows-x64/**/*"

  - label: ":freebsd: release blocker freebsd-x64"
    key: "freebsd-x64-blocker"
    depends_on: "release-dry-run-linux-x64"
    command: "CTX_ARTIFACT_DIR=artifacts/buildkite/release-blockers/freebsd-x64 ./scripts/release-platform-blocker.sh freebsd-x64"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 5
    artifact_paths:
      - "artifacts/buildkite/release-blockers/freebsd-x64/*"
      - "artifacts/buildkite/release-blockers/freebsd-x64/**/*"

  - label: ":package: release candidate metadata"
    key: "release-candidate-metadata"
    depends_on:
      - "release-dry-run-linux-x64"
      - "release-dry-run-macos-arm64"
      - "release-dry-run-macos-x64"
      - "release-dry-run-windows-x64"
      - "freebsd-x64-blocker"
    command: |
      normalize_downloaded_artifact_paths() {
        local file rel normalized normalized_dir conflict_path

        while IFS= read -r -d '' file; do
          rel="$${file#./}"
          normalized="$${rel//\\//}"
          if [[ "$${normalized}" == "$${rel}" ]]; then
            continue
          fi

          normalized_dir="$$(dirname "$${normalized}")"
          mkdir -p "$${normalized_dir}"
          if [[ -e "$${normalized}" ]]; then
            if cmp -s "$${file}" "$${normalized}"; then
              rm -f "$${file}"
            else
              conflict_path="$${normalized}.windows-path-conflict"
              mv "$${file}" "$${conflict_path}"
              printf 'conflicting downloaded artifact path: %s -> %s; kept %s\n' "$${rel}" "$${normalized}" "$${conflict_path}" >&2
            fi
          else
            mv "$${file}" "$${normalized}"
          fi
        done < <(find . -type f -name '*\\*' -print0)
      }

      download_artifacts() {
        local prefix="$$1"
        local windows_prefix

        windows_prefix="$${prefix//\//\\}"

        buildkite-agent artifact download "$${prefix}/*" . || true
        buildkite-agent artifact download "$${prefix}/**/*" . || true
        if [[ "$${windows_prefix}" != "$${prefix}" ]]; then
          buildkite-agent artifact download "$${windows_prefix}\\*" . || true
          buildkite-agent artifact download "$${windows_prefix}\\**\\*" . || true
        fi
        normalize_downloaded_artifact_paths
      }

      download_artifacts "artifacts/buildkite/release-dry-run/linux-x64"
      download_artifacts "artifacts/buildkite/release-dry-run/macos-arm64"
      download_artifacts "artifacts/buildkite/release-dry-run/macos-x64"
      download_artifacts "artifacts/buildkite/release-dry-run/windows-x64"
      download_artifacts "artifacts/buildkite/release-blockers/freebsd-x64"
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-candidate ./scripts/release-candidate-metadata.sh \
        artifacts/buildkite/release-dry-run \
        artifacts/buildkite/release-blockers/freebsd-x64/freebsd-x64-blocker.json
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 10
    artifact_paths:
      - "artifacts/buildkite/release-candidate/*"
      - "artifacts/buildkite/release-candidate/**/*"

  - label: ":cloudflare: R2 staging smoke"
    key: "r2-staging-smoke"
    depends_on: "release-candidate-metadata"
    command: |
      normalize_downloaded_artifact_paths() {
        local file rel normalized normalized_dir conflict_path

        while IFS= read -r -d '' file; do
          rel="$${file#./}"
          normalized="$${rel//\\//}"
          if [[ "$${normalized}" == "$${rel}" ]]; then
            continue
          fi

          normalized_dir="$$(dirname "$${normalized}")"
          mkdir -p "$${normalized_dir}"
          if [[ -e "$${normalized}" ]]; then
            if cmp -s "$${file}" "$${normalized}"; then
              rm -f "$${file}"
            else
              conflict_path="$${normalized}.windows-path-conflict"
              mv "$${file}" "$${conflict_path}"
              printf 'conflicting downloaded artifact path: %s -> %s; kept %s\n' "$${rel}" "$${normalized}" "$${conflict_path}" >&2
            fi
          else
            mv "$${file}" "$${normalized}"
          fi
        done < <(find . -type f -name '*\\*' -print0)
      }

      download_artifacts() {
        local prefix="$$1"
        local windows_prefix

        windows_prefix="$${prefix//\//\\}"

        buildkite-agent artifact download "$${prefix}/*" . || true
        buildkite-agent artifact download "$${prefix}/**/*" . || true
        if [[ "$${windows_prefix}" != "$${prefix}" ]]; then
          buildkite-agent artifact download "$${windows_prefix}\\*" . || true
          buildkite-agent artifact download "$${windows_prefix}\\**\\*" . || true
        fi
        normalize_downloaded_artifact_paths
      }

      download_artifacts "artifacts/buildkite/release-candidate"
      CTX_ARTIFACT_DIR=artifacts/buildkite/r2-staging-smoke ./scripts/release-r2-staging-smoke.sh \
        artifacts/buildkite/release-candidate
