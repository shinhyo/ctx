env:
  CARGO_TERM_COLOR: "always"
  CARGO_BUILD_JOBS: "2"
  RUST_TEST_THREADS: "2"
  CTX_BOOTSTRAP_BAZELISK: "1"

steps:
  - label: ":bazel: search CI gate"
    key: "search-mvp"
    command: |
      apt_get_updated=0

      run_apt_get() {
        if command -v sudo >/dev/null 2>&1; then
          sudo "$$@"
        else
          "$$@"
        fi
      }

      install_ubuntu_package() {
        command -v apt-get >/dev/null 2>&1 || {
          echo "$$1 is missing and apt-get is unavailable on this Buildkite agent" >&2
          exit 127
        }
        if [ "$${apt_get_updated}" -eq 0 ]; then
          run_apt_get apt-get update
          apt_get_updated=1
        fi
        run_apt_get env DEBIAN_FRONTEND=noninteractive apt-get install -y "$$1"
      }

      ensure_runner_tool() {
        tool_binary="$$1"
        apt_package="$$2"
        required_message="$$3"

        if ! command -v "$${tool_binary}" >/dev/null 2>&1; then
          install_ubuntu_package "$${apt_package}"
        fi
        command -v "$${tool_binary}" >/dev/null 2>&1 || {
          echo "$${required_message}" >&2
          exit 127
        }
      }

      ensure_runner_tool zip zip "zip is required for Bazel undeclared test output packaging"
      ensure_runner_tool rg ripgrep "ripgrep (rg) is required for CI static and package audits"
      ./scripts/check.sh --mode=ci
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "bazel-testlogs/**/*.log"
      - "bazel-testlogs/**/test.outputs/**/*"
      - "bazel-testlogs/**/test.outputs/**/ctx-artifacts/**/*"
      - "bazel-testlogs/**/*.zip"

  - label: ":linux: release artifact smoke"
    key: "linux-release-artifact-smoke"
    depends_on: "search-mvp"
    command: |
      CTX_RELEASE_PLATFORM=linux-x64 \
      CTX_RELEASE_TARGET_TRIPLE=x86_64-unknown-linux-gnu \
      CTX_EXPECT_HOST_TRIPLE=x86_64-unknown-linux-gnu \
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-dry-run/linux-x64 \
      ./scripts/release-dry-run.sh

      CTX_RELEASE_PLATFORM=linux-x64 \
      CTX_RELEASE_TARGET_TRIPLE=x86_64-unknown-linux-gnu \
      CTX_EXPECT_HOST_TRIPLE=x86_64-unknown-linux-gnu \
      CTX_RELEASE_DRY_RUN_DIR=artifacts/buildkite/release-dry-run/linux-x64 \
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-artifact-smoke/linux-x64 \
      ./scripts/release-artifact-smoke.sh linux-x64
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/linux-x64/*"
      - "artifacts/buildkite/release-artifact-smoke/linux-x64/*"
      - "artifacts/buildkite/release-artifact-smoke/linux-x64/**/*"

  - label: ":mac: arm64 checkout cleanup"
    key: "macos-arm64-checkout-cleanup"
    depends_on: "search-mvp"
    env:
      BUILDKITE_SKIP_CHECKOUT: "true"
    command: |
      checkout_root="$${BUILDKITE_BUILD_PATH:-}"
      checkout_dir="$${checkout_root}/$${BUILDKITE_ORGANIZATION_SLUG:-luca-king}/$${BUILDKITE_PIPELINE_SLUG:-ctx-public-release-verification}"
      if [ -n "$${checkout_root}" ] && [ -d "$${checkout_dir}" ]; then
        chmod -R u+rwX "$${checkout_dir}" || true
        rm -rf "$${checkout_dir}"
      fi
    agents:
      queue: "ctx-mac-gui-shared-arm64"
      os: "darwin"
      arch: "arm64"
    timeout_in_minutes: 10

  - label: ":mac: x64 checkout cleanup"
    key: "macos-x64-checkout-cleanup"
    depends_on: "search-mvp"
    env:
      BUILDKITE_SKIP_CHECKOUT: "true"
    command: |
      checkout_root="$${BUILDKITE_BUILD_PATH:-}"
      checkout_dir="$${checkout_root}/$${BUILDKITE_ORGANIZATION_SLUG:-luca-king}/$${BUILDKITE_PIPELINE_SLUG:-ctx-public-release-verification}"
      if [ -n "$${checkout_root}" ] && [ -d "$${checkout_dir}" ]; then
        chmod -R u+rwX "$${checkout_dir}" || true
        rm -rf "$${checkout_dir}"
      fi
    agents:
      queue: "ctx-mac-gui-shared-x64"
      os: "darwin"
      arch: "x86_64"
    timeout_in_minutes: 10

  - label: ":mac: arm64 release artifact smoke"
    key: "macos-arm64-release-artifact-smoke"
    depends_on:
      - "search-mvp"
      - "macos-arm64-checkout-cleanup"
    command: |
      CTX_RELEASE_PLATFORM=macos-arm64 \
      CTX_RELEASE_TARGET_TRIPLE=aarch64-apple-darwin \
      CTX_EXPECT_HOST_TRIPLE=aarch64-apple-darwin \
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-dry-run/macos-arm64 \
      ./scripts/release-dry-run.sh

      CTX_RELEASE_PLATFORM=macos-arm64 \
      CTX_RELEASE_TARGET_TRIPLE=aarch64-apple-darwin \
      CTX_EXPECT_HOST_TRIPLE=aarch64-apple-darwin \
      CTX_RELEASE_DRY_RUN_DIR=artifacts/buildkite/release-dry-run/macos-arm64 \
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-artifact-smoke/macos-arm64 \
      ./scripts/release-artifact-smoke.sh macos-arm64
    agents:
      queue: "ctx-mac-gui-shared-arm64"
      os: "darwin"
      arch: "arm64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/macos-arm64/*"
      - "artifacts/buildkite/release-artifact-smoke/macos-arm64/*"
      - "artifacts/buildkite/release-artifact-smoke/macos-arm64/**/*"

  - label: ":mac: x64 release artifact smoke"
    key: "macos-x64-release-artifact-smoke"
    depends_on:
      - "search-mvp"
      - "macos-x64-checkout-cleanup"
    command: |
      CTX_RELEASE_PLATFORM=macos-x64 \
      CTX_RELEASE_TARGET_TRIPLE=x86_64-apple-darwin \
      CTX_EXPECT_HOST_TRIPLE=x86_64-apple-darwin \
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-dry-run/macos-x64 \
      ./scripts/release-dry-run.sh

      CTX_RELEASE_PLATFORM=macos-x64 \
      CTX_RELEASE_TARGET_TRIPLE=x86_64-apple-darwin \
      CTX_EXPECT_HOST_TRIPLE=x86_64-apple-darwin \
      CTX_RELEASE_DRY_RUN_DIR=artifacts/buildkite/release-dry-run/macos-x64 \
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-artifact-smoke/macos-x64 \
      ./scripts/release-artifact-smoke.sh macos-x64
    agents:
      queue: "ctx-mac-gui-shared-x64"
      os: "darwin"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/macos-x64/*"
      - "artifacts/buildkite/release-artifact-smoke/macos-x64/*"
      - "artifacts/buildkite/release-artifact-smoke/macos-x64/**/*"

  - label: ":windows: x64 release artifact smoke"
    key: "windows-x64-release-artifact-smoke"
    depends_on: "search-mvp"
    command: |
      powershell -NoProfile -ExecutionPolicy Bypass -Command "$$env:CTX_RELEASE_PLATFORM='windows-x64'; $$env:CTX_RELEASE_TARGET_TRIPLE='x86_64-pc-windows-gnu'; $$env:CTX_EXPECT_HOST_TRIPLE='x86_64-pc-windows-gnu'; $$env:CTX_ARTIFACT_DIR='artifacts/buildkite/release-dry-run/windows-x64'; .\scripts\ci-windows.ps1 -Mode release-dry-run; $$env:CTX_RELEASE_DRY_RUN_DIR='artifacts/buildkite/release-dry-run/windows-x64'; $$env:CTX_ARTIFACT_DIR='artifacts/buildkite/release-artifact-smoke/windows-x64'; .\scripts\ci-windows.ps1 -Mode release-artifact-smoke"
    agents:
      queue: "windows-x64"
      os: "windows"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/windows-x64/*"
      - "artifacts/buildkite/release-artifact-smoke/windows-x64/*"
      - "artifacts/buildkite/release-artifact-smoke/windows-x64/**/*"

  - label: ":freebsd: native release proof"
    key: "freebsd-native-release-proof"
    depends_on: "search-mvp"
    command: |
      freebsd_uname="$$(uname -s 2>/dev/null || true)"
      if [ "$${freebsd_uname}" != "FreeBSD" ]; then
        echo "freebsd-native-release-proof must run on FreeBSD; got $${freebsd_uname:-unknown}" >&2
        exit 1
      fi

      run_pkg() {
        if command -v sudo >/dev/null 2>&1; then
          sudo "$$@"
        else
          "$$@"
        fi
      }

      install_freebsd_package() {
        command -v pkg >/dev/null 2>&1 || {
          echo "$$1 is missing and pkg is unavailable on this Buildkite agent" >&2
          exit 127
        }
        run_pkg pkg install -y "$$1"
      }

      ensure_freebsd_tool() {
        tool_binary="$$1"
        pkg_name="$$2"
        required_message="$$3"

        if ! command -v "$${tool_binary}" >/dev/null 2>&1; then
          install_freebsd_package "$${pkg_name}"
        fi
        command -v "$${tool_binary}" >/dev/null 2>&1 || {
          echo "$${required_message}" >&2
          exit 127
        }
      }

      ensure_freebsd_tool bash bash "bash is required for ctx release scripts"
      ensure_freebsd_tool git git "git is required for release evidence commits"
      ensure_freebsd_tool cargo rust "cargo is required for native FreeBSD ctx tests"
      ensure_freebsd_tool rustc rust "rustc is required for native FreeBSD ctx builds"

      cargo test --workspace --all-targets --locked -- --test-threads "$${RUST_TEST_THREADS:-2}"
      ./scripts/release-dry-run.sh
      CTX_RELEASE_DRY_RUN_DIR=artifacts/buildkite/release-dry-run/freebsd-x64 \
      CTX_ARTIFACT_DIR=artifacts/buildkite/release-artifact-smoke/freebsd-x64 \
      ./scripts/release-artifact-smoke.sh freebsd-x64
    env:
      CTX_ARTIFACT_DIR: "artifacts/buildkite/release-dry-run/freebsd-x64"
      CTX_RELEASE_PLATFORM: "freebsd-x64"
      CTX_RELEASE_TARGET_TRIPLE: "x86_64-unknown-freebsd"
      CTX_EXPECT_HOST_TRIPLE: "x86_64-unknown-freebsd"
    agents:
      queue: "freebsd-x64"
      ctx-runner-class: "release-freebsd-x64-stage"
      os: "freebsd"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-dry-run/freebsd-x64/*"
      - "artifacts/buildkite/release-dry-run/freebsd-x64/**/*"
      - "artifacts/buildkite/release-artifact-smoke/freebsd-x64/*"
      - "artifacts/buildkite/release-artifact-smoke/freebsd-x64/**/*"

  - label: ":package: aggregate release evidence"
    key: "aggregate-release-evidence"
    depends_on:
      - "linux-release-artifact-smoke"
      - "macos-arm64-release-artifact-smoke"
      - "macos-x64-release-artifact-smoke"
      - "windows-x64-release-artifact-smoke"
      - "freebsd-native-release-proof"
    command: |
      echo "Aggregating platform release evidence from Buildkite artifacts."
      echo "R2 upload/readback is plan-only in this lane; real upload/readback requires CTX_RELEASE_R2_UPLOAD_READBACK=1, CTX_RELEASE_R2_MANAGER_APPROVED=1, and authenticated wrangler in an approved manager-run lane."

      download_platform_artifacts() {
        step_key="$$1"
        platform="$$2"

        buildkite-agent artifact download "artifacts/buildkite/release-dry-run/$${platform}/*" . --step "$${step_key}"
        buildkite-agent artifact download "artifacts/buildkite/release-dry-run/$${platform}/**/*" . --step "$${step_key}" || true
        buildkite-agent artifact download "artifacts/buildkite/release-artifact-smoke/$${platform}/*" . --step "$${step_key}"
        buildkite-agent artifact download "artifacts/buildkite/release-artifact-smoke/$${platform}/**/*" . --step "$${step_key}" || true
      }

      require_fetched_artifact() {
        required_path="$$1"
        if [ ! -s "$${required_path}" ]; then
          echo "missing required aggregate release artifact: $${required_path}" >&2
          exit 1
        fi
      }

      download_platform_artifacts linux-release-artifact-smoke linux-x64
      download_platform_artifacts macos-arm64-release-artifact-smoke macos-arm64
      download_platform_artifacts macos-x64-release-artifact-smoke macos-x64
      download_platform_artifacts windows-x64-release-artifact-smoke windows-x64
      download_platform_artifacts freebsd-native-release-proof freebsd-x64

      require_fetched_artifact artifacts/buildkite/release-dry-run/linux-x64/manifest.json
      require_fetched_artifact artifacts/buildkite/release-dry-run/linux-x64/ctx-release-metadata.env
      require_fetched_artifact artifacts/buildkite/release-dry-run/linux-x64/checksums.sha256
      require_fetched_artifact artifacts/buildkite/release-dry-run/linux-x64/ctx-0.1.0-x86_64-unknown-linux-gnu
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/linux-x64/artifact-smoke.json
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/linux-x64/commands/version.stdout
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-arm64/manifest.json
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-arm64/ctx-release-metadata.env
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-arm64/checksums.sha256
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-arm64/ctx-0.1.0-aarch64-apple-darwin
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/macos-arm64/artifact-smoke.json
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/macos-arm64/commands/version.stdout
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-x64/manifest.json
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-x64/ctx-release-metadata.env
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-x64/checksums.sha256
      require_fetched_artifact artifacts/buildkite/release-dry-run/macos-x64/ctx-0.1.0-x86_64-apple-darwin
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/macos-x64/artifact-smoke.json
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/macos-x64/commands/version.stdout
      require_fetched_artifact artifacts/buildkite/release-dry-run/windows-x64/manifest.json
      require_fetched_artifact artifacts/buildkite/release-dry-run/windows-x64/ctx-release-metadata.env
      require_fetched_artifact artifacts/buildkite/release-dry-run/windows-x64/checksums.sha256
      require_fetched_artifact artifacts/buildkite/release-dry-run/windows-x64/ctx-0.1.0-x86_64-pc-windows-gnu.exe
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/windows-x64/artifact-smoke.json
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/windows-x64/commands/version.stdout
      require_fetched_artifact artifacts/buildkite/release-dry-run/freebsd-x64/manifest.json
      require_fetched_artifact artifacts/buildkite/release-dry-run/freebsd-x64/ctx-release-metadata.env
      require_fetched_artifact artifacts/buildkite/release-dry-run/freebsd-x64/checksums.sha256
      require_fetched_artifact artifacts/buildkite/release-dry-run/freebsd-x64/ctx-0.1.0-x86_64-unknown-freebsd
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/freebsd-x64/artifact-smoke.json
      require_fetched_artifact artifacts/buildkite/release-artifact-smoke/freebsd-x64/commands/version.stdout

      mkdir -p artifacts/buildkite/pipeline-contract
      printf 'Buildkite aggregate-release-evidence verified platform artifact proof and release evidence assembly for %s\n' "$${BUILDKITE_BUILD_URL:-unknown-build}" \
        > artifacts/buildkite/pipeline-contract/pipeline-contract.txt

      CTX_ARTIFACT_DIR=artifacts/buildkite/release-candidate \
        ./scripts/release-candidate-metadata.sh artifacts/buildkite/release-dry-run
      CTX_ARTIFACT_DIR=artifacts/buildkite/r2-staging-smoke \
        ./scripts/release-r2-staging-smoke.sh artifacts/buildkite/release-candidate
      CTX_ARTIFACT_DIR=artifacts/buildkite/supply-chain \
        ./scripts/release-supply-chain-proof.sh
      CTX_RELEASE_R2_UPLOAD_READBACK=0 \
      CTX_RELEASE_R2_MANAGER_APPROVED=0 \
      CTX_ARTIFACT_DIR=artifacts/buildkite/r2-staging-readback \
        ./scripts/release-r2-staging-readback-proof.sh artifacts/buildkite/release-candidate
      ./scripts/release-finished-product-evidence.sh artifacts/buildkite
      CTX_COMPLETION_CERTIFICATE_ALLOW_SELF_TEST_FIXTURES=0 \
      CTX_ARTIFACT_DIR=artifacts/buildkite/completion-certificate \
        ./scripts/release-completion-certificate.sh --mode=release-evidence
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 60
    artifact_paths:
      - "artifacts/buildkite/release-candidate/*"
      - "artifacts/buildkite/release-candidate/**/*"
      - "artifacts/buildkite/r2-staging-smoke/*"
      - "artifacts/buildkite/r2-staging-smoke/**/*"
      - "artifacts/buildkite/supply-chain/*"
      - "artifacts/buildkite/supply-chain/**/*"
      - "artifacts/buildkite/r2-staging-readback/*"
      - "artifacts/buildkite/r2-staging-readback/**/*"
      - "artifacts/buildkite/finished-product/*"
      - "artifacts/buildkite/finished-product/**/*"
      - "artifacts/buildkite/provider-live-e2e-lanes/*"
      - "artifacts/buildkite/provider-live-e2e-lanes/**/*"
      - "artifacts/buildkite/completion-certificate/*"
      - "artifacts/buildkite/completion-certificate/**/*"
      - "artifacts/buildkite/pipeline-contract/*"
